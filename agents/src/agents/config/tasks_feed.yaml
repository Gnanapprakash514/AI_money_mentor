market_watch_task:
  description: >
    Build today's India market intelligence brief with numbers on indices,
    macro, flows, fixed income, gold and key corporate updates.
  expected_output: >
    Structured market brief with concise bullet points.
  agent: market_watcher_agent

feed_compose_task:
  description: >
    Using market brief and profile: {profile}, compose a personalized
    daily feed with relevance filter, actions, insight and tomorrow watch.
  expected_output: >
    Personalized daily financial feed in markdown.
  agent: feed_composer_agent
  context:
    - market_watch_task
  output_file: outputs/daily_feed.md
