fire_analysis_task:
  description: >
    Using the user's financial profile: {profile}
    perform FIRE analysis including required corpus, trajectory and savings gap.
  expected_output: >
    A FIRE analysis report with corpus target, timeline and verdict.
  agent: fire_analyst_agent

sip_plan_task:
  description: >
    Using FIRE analysis and profile: {profile}, create actionable SIP allocation,
    rebalancing plan, step-up plan and risk guardrails.
  expected_output: >
    A production-ready SIP plan in markdown.
  agent: sip_planner_agent
  context:
    - fire_analysis_task
  output_file: outputs/fire_roadmap.md
